<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}My Blog{% endblock %}</title>
    <meta name="description" content="A modern Flask blog platform built with Bootstrap and dynamic UI enhancements.">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
/* GLOBAL */
body {
    font-family: 'Poppins', sans-serif;
    background-color: #f8f9fa;
    animation: pageFade 0.4s ease-in-out;
}

@keyframes pageFade {
    from { opacity: 0; }
    to { opacity: 1; }
}

p {
    line-height: 1.7;
}

/* HERO */
.hero {
    background-image: url("{{ hero_image }}");
    background-size: cover;
    background-position: center;
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

.hero-text {
    background: rgba(0,0,0,0.65);
    padding: 50px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    max-width: 650px;
}

.hero-text h1 {
    font-size: 48px;
    font-weight: 700;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
}

/* BUTTONS */
.btn-custom {
    background: #ff6b6b;
    color: white;
    border-radius: 10px;
    transition: all 0.3s ease;
}

.btn-custom:hover {
    background: #ff4b4b;
    transform: translateY(-3px) scale(1.05);
}

/* NAVBAR */
.navbar-brand {
    letter-spacing: 1px;
    transition: transform 0.3s ease;
}

.navbar-brand:hover {
    transform: scale(1.05);
}

.navbar-scrolled {
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

/* FOOTER */
.footer {
    font-size: 14px;
    padding-bottom: 20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav id="mainNavbar" class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand fw-bold fs-4" href="/">MyBlog</a>

    <div class="navbar-nav">
        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
        <a class="nav-link {% if request.path == '/posts' %}active{% endif %}" href="/posts">Posts</a>
        <a class="nav-link {% if request.path == '/create' %}active{% endif %}" href="/create">Create</a>
        <a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="/about">About</a>
        <a class="nav-link {% if request.path == '/contact' %}active{% endif %}" href="/contact">Contact</a>
        <a class="nav-link {% if request.path == '/profile' %}active{% endif %}" href="/profile">Profile</a>
        <a class="nav-link {% if request.path == '/login' %}active{% endif %}" href="/login">Login</a>
        <a class="nav-link {% if request.path == '/register' %}active{% endif %}" href="/register">Register</a>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4" style="max-width: 1100px;">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer class="footer mt-5 py-4 bg-dark text-light text-center">
    <div class="container">
        <p class="mb-1">© 2026 My Flask Blog. All rights reserved.</p>
        <small>Built with Flask & Bootstrap</small>
    </div>
</footer>

<!-- NAVBAR SCROLL EFFECT -->
<script>
window.addEventListener("scroll", function() {
    const navbar = document.getElementById("mainNavbar");
    if (window.scrollY > 50) {
        navbar.classList.add("navbar-scrolled");
    } else {
        navbar.classList.remove("navbar-scrolled");
    }
});
</script>

</body>
</html>
