<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Blog{% endblock %}</title>
<link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font (เพิ่มความโปร) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
    background-color: #f8f9fa;
}
        .nav-link {
    transition: color 0.3s ease, transform 0.2s ease;
}

.nav-link:hover {
    transform: translateY(-2px);
}
    html {
    scroll-behavior: smooth;
}    
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }

        /* HERO SECTION */
        .hero {
            background-image: url("{{ hero_image }}");

            height: 80vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            color: white;
            text-align: center;
        }

    .hero-text {
    background: rgba(0,0,0,0.65);
    padding: 50px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    max-width: 600px;
    animation: fadeIn 1.2s ease-in-out;
}

.hero-text h1 {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 15px;
    letter-spacing: 1px;
}

.hero-text p {
    font-size: 18px;
    opacity: 0.9;
}
            animation: fadeIn 1.2s ease-in-out;
        }

        /* CUSTOM BUTTON */
        .btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: #ff6b6b;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: all 0.3s ease;
}

.btn:hover {
    background: #ff4b4b;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
        .btn-custom {
            margin-top: 15px;
            padding: 10px 20px;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            background: #ff4b4b;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* FADE ANIMATION */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    .nav-link.active 
    
    /* Responsive Design */
@media (max-width: 768px) {

    .hero {
        height: 60vh;
        padding: 20px;
        text-align: center;
    }

    .hero-text {
        padding: 30px;
    }

    .hero-text h1 {
        font-size: 32px;
    }

    .hero-text p {
        font-size: 16px;
    }

    .navbar-nav {
        text-align: center;
    }

}
.navbar {
    transition: all 0.3s ease;
}
    </style>
    .footer {
    font-size: 14px;
    letter-spacing: 0.5px;
}

</head>
<footer class="footer mt-5 py-4 bg-dark text-light text-center">
    <div class="container">
        <p class="mb-1">© 2026 My Flask Blog. All rights reserved.</p>
        <small>Built with Flask & Bootstrap</small>
    </div>
</footer>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 shadow-sm">
    <a class="navbar-brand fw-bold" href="/">MyBlog</a>
    <div class="navbar-nav">
<a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
<a class="nav-link {% if request.path == '/posts' %}active{% endif %}" href="/posts">Posts</a>
<a class="nav-link {% if request.path == '/create' %}active{% endif %}" href="/create">Create</a>
<a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="/about">About</a>
<a class="nav-link {% if request.path == '/contact' %}active{% endif %}" href="/contact">Contact</a>
<a class="nav-link {% if request.path == '/profile' %}active{% endif %}" href="/profile">Profile</a>
<a class="nav-link {% if request.path == '/login' %}active{% endif %}" href="/login">Login</a>
<a class="nav-link {% if request.path == '/register' %}active{% endif %}" href="/register">Register</a>
    </div>
</nav>

<div class="container mt-4" style="max-width: 1100px;">
    {% block content %}{% endblock %}
</div>

</body>
</html>
