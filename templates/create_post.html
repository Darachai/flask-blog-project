{% extends "base.html" %}

{% block content %}
<h2>Create Post</h2>

<form method="POST">
    <input type="text" name="title" class="form-control mb-2" placeholder="Title">
    <textarea name="content" class="form-control mb-2" placeholder="Content"></textarea>
    <button class="btn btn-primary">Submit</button>
</form>

{% endblock %}
